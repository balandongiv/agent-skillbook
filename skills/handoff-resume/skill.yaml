slug: handoff-resume
title: Handoff Resume
summary: Resume repository work from an existing handoff markdown by reading it first, executing pending tasks in order, and marking completed tasks with `Done? = Yes` only when concrete evidence exists.
when_to_use:
  - when the user asks to continue from a handoff markdown
  - when work must be resumed from `handoff/*.md` instead of rebuilt from memory
  - when pending tasks in a handoff need to be completed and tracked explicitly
when_not_to_use:
  - when the user wants a new handoff note rather than resumed execution
  - when there is no handoff artifact to resume from
tags:
  - handoff
  - resume
  - continuity
  - operations
  - execution
invocation:
  auto: true
  explicit: true
platform_overrides:
  claude:
    disable_model_invocation: false
    user_invocable: true
    allowed_tools: []
  openai:
    include_openai_yaml: true
  gemini:
    manual_selection: true
