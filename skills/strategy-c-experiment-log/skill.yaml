slug: strategy-c-experiment-log
title: Strategy C Experiment Log
summary: Ensure every exploratory experiment tied to Strategy C gets a structured entry in the development_strategy/strategy_C/obs/log_strategy_c_approach1.md log so future agents see consistent history.
when_to_use:
  - when the user asks for an exploratory experiment, validation run, or analysis spinoff that touches Strategy C
  - when planning or running experiments that need traceable rationale, implementation notes, and metrics
  - when new observations, hypotheses, or experiment variants need permanent documentation
  - when the work should follow the log_strategy_c_approach1.md template so other agents can build on it
when_not_to_use:
  - when the task is purely code refactoring with no experimental context
  - when the user explicitly says no logging is needed
  - when the work targets a different strategy or documentation outside Strategy C
tags:
  - experiment
  - logging
  - traceability
  - documentation
  - strategy
invocation:
  auto: true
  explicit: true
platform_overrides:
  claude:
    disable_model_invocation: false
    user_invocable: true
    allowed_tools: []
  openai:
    include_openai_yaml: true
  gemini:
    manual_selection: true
