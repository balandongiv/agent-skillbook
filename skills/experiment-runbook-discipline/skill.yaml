slug: experiment-runbook-discipline
title: Experiment Runbook Discipline
summary: Plan, launch, monitor, and document long-running experiments or validation sweeps with smallest-real-data smoke scopes, fresh experiment prefixes, live status artifacts, rolling logs, and promotion to full runs only after explicit pass criteria are met.
when_to_use:
  - when launching a long-running experiment, validation sweep, batch evaluation, or subject-by-subject run
  - when the user needs background execution, rolling logs, live status files, or progress verification
  - when experiment outputs must stay traceable through prefixes, markdown notes, and final artifact checks
  - when logic changes require clean reruns of previously validated scopes
  - when the user requires actual dataset smoke validation before promoting to broader runs
  - when editable local dependencies are part of the runtime and may need to be patched and revalidated
when_not_to_use:
  - when the task is only to analyze completed results and no new run needs to be planned or monitored
  - when the main request is choosing a parameter search algorithm rather than executing and tracking an experiment
  - when the work is purely code editing or refactoring unrelated to experiment execution
tags:
  - experimentation
  - validation
  - runbook
  - monitoring
  - logging
  - reproducibility
invocation:
  auto: true
  explicit: true
platform_overrides:
  claude:
    disable_model_invocation: false
    user_invocable: true
    allowed_tools: []
  openai:
    include_openai_yaml: true
  gemini:
    manual_selection: true
